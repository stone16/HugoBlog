baseURL: "https://stometa.top"
languageCode: "en-us"
title: "Stometa's Blog"
theme: ["PaperMod"]

params:
  env: production
  description: "Practical insights on AI, indie products, and building in public — by Stometa, founder of ZentaStone"
  author: "Stometa"
  showFullContent: true
  showBreadCrumbs: true
  ShowToc: true
  TocOpen: true
  UseHugoToc: true
  showReadingTime: true
  showWordCount: false
  showShareButtons: true
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  comments: true
  defaultTheme: dark
  disableThemeToggle: true
  enableSearch: true
  enableArchive: true
  enableEmoji: true

  socialIcons:
    - name: "github"
      url: "https://github.com/stone16"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/leilei-chen-837870b4/"
    - name: "x"
      url: "https://x.com/stometaverse"

  # Favicon — SVG with PNG fallbacks
  assets:
    favicon: "/favicon.svg"
    favicon16x16: "/favicon.svg"
    favicon32x32: "/favicon.svg"
    apple_touch_icon: "/favicon.svg"

  # Google Analytics 4 — fill in your Measurement ID (G-XXXXXXXXXX)
  # Get it from: analytics.google.com → Admin → Data Streams
  googleAnalytics: "G-QJ0Y03F19K"

  analytics:
    google:
      SiteVerificationTag: ""

  footer:
    hideCopyright: true
    text: "Stometa · Founder of [ZentaStone](https://zentastone.com)"

menu:
  main:
    - identifier: "home"
      name: "Home"
      url: "/"
      weight: 10
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 20
    - identifier: "categories"
      name: "Categories"
      url: "/categories/"
      weight: 30
    - identifier: "tags"
      name: "Tags"
      url: "/tags/"
      weight: 40
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 50

taxonomies:
  category: "categories"
  tag: "tags"
  series: "series"

markup:
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    noClasses: false

build:
  useResourceCacheWhen: always

caches:
  images:
    dir: :cacheDir/images

outputs:
  home:
    - HTML
    - RSS
    - JSON
